faq_en:
  - question: "What is Issuebeam?"
    answer: "Issuebeam is a lightweight skeleton that connects Cursor chat to GitHub Issues. The agent runs a Python CLI to create, comment, and close issues — no gh CLI, no PowerShell scripts."
  - question: "Do I need the gh CLI?"
    answer: "No. Issuebeam uses a stdlib-only Python script (urllib) that talks directly to the GitHub REST API. You only need Python and a Personal Access Token with Issues read/write."
  - question: "How does the Cursor agent know to use it?"
    answer: "Copy the skeleton into your repo (or use adopt.py). The file .cursor/rules/github-issues.mdc has alwaysApply: true, so the agent runs python scripts/github_issue.py directly instead of asking you to paste commands."
  - question: "Can I adopt it into an existing project?"
    answer: "Yes. Run python scripts/adopt.py --target ../my-repo --repo myorg/my-app. It copies the CLI, labels, issue templates, and Cursor rule, then writes tracker/github_repo with your slug."
  - question: "Where does the token live?"
    answer: "Prefer Windows user env var GITHUB_TOKEN (works in Cursor terminals). Alternatives: .env (gitignored) or .secrets/github_token. Never commit tokens or paste them in chat."

faq_it:
  - question: "Cos'è Issuebeam?"
    answer: "Issuebeam è uno skeleton leggero che collega la chat Cursor a GitHub Issues. L'agente esegue una CLI Python per creare, commentare e chiudere issue — senza gh CLI e senza script PowerShell."
  - question: "Serve la gh CLI?"
    answer: "No. Issuebeam usa uno script Python solo stdlib (urllib) che parla direttamente con l'API REST di GitHub. Ti basta Python e un Personal Access Token con permessi Issues read/write."
  - question: "Come fa l'agente Cursor a usarlo?"
    answer: "Copia lo skeleton nel repo (o usa adopt.py). Il file .cursor/rules/github-issues.mdc ha alwaysApply: true, quindi l'agente esegue python scripts/github_issue.py da solo invece di chiederti comandi da incollare."
  - question: "Posso adottarlo in un progetto esistente?"
    answer: "Sì. Esegui python scripts/adopt.py --target ../my-repo --repo myorg/my-app. Copia CLI, label, template issue e regola Cursor, poi scrive tracker/github_repo con il tuo slug."
  - question: "Dove metto il token?"
    answer: "Preferisci la variabile utente Windows GITHUB_TOKEN (funziona nel terminale Cursor). Alternative: .env (gitignored) o .secrets/github_token. Mai committare token o incollarli in chat."

