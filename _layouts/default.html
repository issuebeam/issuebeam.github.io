<!DOCTYPE html>
<html lang="{{ page.lang | default: 'en' }}" class="scroll-smooth">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=0" />
    <title>{{ page.title | default: site.title }}</title>
    <link rel="icon" href="/assets/images/logo/favicon.svg" type="image/svg+xml">
    <link rel="icon" type="image/x-icon" href="/assets/images/logo/favicon.ico">
    <link rel="apple-touch-icon" href="/assets/images/logo/favicon.svg">
    {% include seo.html %}
    <script src="https://cdn.tailwindcss.com?plugins=typography"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'system-ui', '-apple-system', 'BlinkMacSystemFont', 'Segoe UI', 'Roboto', 'sans-serif'],
                        display: ['Inter', 'system-ui', '-apple-system', 'BlinkMacSystemFont', 'Segoe UI', 'Roboto', 'sans-serif'],
                        mono: ['ui-monospace', 'SFMono-Regular', 'Menlo', 'Monaco', 'Consolas', 'monospace'],
                    },
                    colors: {
                        brand: {
                            purple: '#7c3aed',
                            purpleLight: '#a78bfa',
                            pink: '#c084fc',
                            pinkLight: '#ddd6fe',
                            gold: '#a78bfa',
                            dark: '#0f172a',
                            surface: '#1e293b',
                            muted: '#94a3b8',
                            ink: '#0f172a',
                            paper: '#f5f3ff',
                            blue: '#7c3aed',
                            green: '#a78bfa',
                            black: '#0f172a',
                            gray: '#1e293b',
                        }
                    },
                    borderRadius: {
                        'pill': '9999px',
                        'xl': '0.25rem',
                        '2xl': '0.5rem',
                        '3xl': '0.75rem',
                        '4xl': '1rem',
                    },
                    animation: {
                        'float': 'float 6s ease-in-out infinite',
                        'float-delayed': 'float 6s ease-in-out 3s infinite',
                        'pulse-slow': 'pulse 4s cubic-bezier(0.4, 0, 0.6, 1) infinite',
                        'marquee': 'marquee 25s linear infinite',
                        'glow-pulse': 'glowPulse 3s ease-in-out infinite',
                        'spin-slow': 'spin 12s linear infinite',
                        'bounce-slow': 'bounce 3s infinite',
                    },
                    keyframes: {
                        marquee: {
                            '0%': { transform: 'translateX(0%)' },
                            '100%': { transform: 'translateX(-100%)' },
                        },
                        glowPulse: {
                            '0%, 100%': { boxShadow: '0 0 20px rgba(124, 58, 237, 0.35)' },
                            '50%': { boxShadow: '0 0 60px rgba(167, 139, 250, 0.65), 0 0 100px rgba(124, 58, 237, 0.25)' },
                        }
                    }
                },
            },
        }
    </script>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.1/css/all.min.css">
    <style>
        body {
            font-family: 'Inter', system-ui, sans-serif;
            -webkit-font-smoothing: antialiased;
            letter-spacing: -0.01em;
        }

        h1,
        h2,
        h3,
        h4,
        h5,
        h6 {
            font-family: 'Inter', system-ui, sans-serif;
            letter-spacing: -0.02em;
        }

        /* Scroll Reveal Classes */
        .reveal {
            opacity: 0;
            transform: translateY(30px);
            transition: all 0.8s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .reveal.active {
            opacity: 1;
            transform: translateY(0);
        }

        /* Staggered delays */
        .delay-100 {
            transition-delay: 100ms;
        }

        .delay-200 {
            transition-delay: 200ms;
        }

        .delay-300 {
            transition-delay: 300ms;
        }

        .delay-400 {
            transition-delay: 400ms;
        }

        /* Index hero: balanced two columns on desktop (no visual bleed) */
        .hero-index__title {
            font-size: clamp(1.75rem, 7.8vw, 2.5rem);
            line-height: 1.05;
        }

        @media (min-width: 640px) {
            .hero-index__title {
                font-size: clamp(2.25rem, 5.5vw, 3.75rem);
            }
        }

        @media (min-width: 1024px) {
            .hero-index__grid {
                grid-template-columns: minmax(0, 1fr) minmax(0, 1fr);
                gap: 2.5rem;
                align-items: center;
            }

            .hero-index__title {
                font-size: clamp(2.5rem, 3.5vw, 3.75rem);
            }

            .hero-index__visual {
                width: 100%;
                max-width: 100%;
                margin-right: 0;
            }
        }

        [data-hero-lang-cycle] [data-hero-lang-code] {
            transition: opacity 0.25s ease;
        }

        /* Custom Animations */
        @keyframes float {

            0%,
            100% {
                transform: translateY(0);
            }

            50% {
                transform: translateY(-15px);
            }
        }

        .animate-float {
            animation: float 6s ease-in-out infinite;
        }

        .animate-float-delayed {
            animation: float 6s ease-in-out 3s infinite;
        }

        @keyframes spin-slow {
            from {
                transform: rotate(0deg);
            }

            to {
                transform: rotate(360deg);
            }
        }

        .animate-spin-slow {
            animation: spin-slow 12s linear infinite;
        }

        .animate-bounce-slow {
            animation: bounce 3s infinite;
        }

        /* Neon glow utilities */
        .glow-purple {
            box-shadow: 0 0 15px rgba(124, 58, 237, 0.25), inset 0 0 10px rgba(167, 139, 250, 0.08);
        }

        .glow-pink {
            box-shadow: 0 0 15px rgba(192, 132, 252, 0.25), inset 0 0 10px rgba(167, 139, 250, 0.08);
        }

        .text-glow {
            text-shadow: 0 0 20px rgba(167, 139, 250, 0.5);
        }

        /* Noise overlay */
        .noise-overlay::before {
            content: '';
            position: absolute;
            inset: 0;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.05'/%3E%3C/svg%3E");
            opacity: 0.04;
            pointer-events: none;
        }

        /* Grid background pattern */
        .bg-grid-pattern {
            background-size: 40px 40px;
            background-image:
                linear-gradient(to right, rgba(124, 58, 237, 0.04) 1px, transparent 1px),
                linear-gradient(to bottom, rgba(124, 58, 237, 0.04) 1px, transparent 1px);
        }
        .dark .bg-grid-pattern {
            background-image:
                linear-gradient(to right, rgba(167, 139, 250, 0.08) 1px, transparent 1px),
                linear-gradient(to bottom, rgba(167, 139, 250, 0.08) 1px, transparent 1px);
        }

        /* Gradient text — violet beam */
        .gradient-text {
            background: linear-gradient(135deg, #7c3aed 0%, #c084fc 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        /* Code block styles */
        .code-block {
            background: #0f172a;
            border: 1px solid rgba(167, 139, 250, 0.25);
            border-radius: 4px;
            font-family: ui-monospace, 'Courier New', monospace;
            font-size: 0.875rem;
            color: #a78bfa;
            padding: 1.5rem;
            overflow-x: auto;
        }

        .code-block .comment {
            color: #94a3b8;
        }

        .code-block .cmd {
            color: #c084fc;
        }

        .code-block .str {
            color: #fbbf24;
        }

        /* Accordion Styles */
        details>summary {
            list-style: none;
        }

        details>summary::-webkit-details-marker {
            display: none;
        }

        details[open] summary~* {
            animation: sweep .3s ease-in-out;
        }

        @keyframes sweep {
            0% {
                opacity: 0;
                transform: translateY(-10px);
            }

            100% {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Card hover glow */
        .card-glow {
            transition: all 0.3s ease;
            border: 1px solid rgba(124, 58, 237, 0.15);
            border-radius: 0.5rem;
        }

        .card-glow:hover {
            border-color: rgba(167, 139, 250, 0.45);
            box-shadow: inset 0 0 20px rgba(167, 139, 250, 0.04), 0 0 20px rgba(124, 58, 237, 0.12);
            transform: translateY(-2px);
        }

        /* Scrollbar */
        ::-webkit-scrollbar {
            width: 6px;
        }

        ::-webkit-scrollbar-track {
            background: #0f172a;
        }

        ::-webkit-scrollbar-thumb {
            background: #7c3aed;
            border-radius: 0px;
        }

        .dark ::-webkit-scrollbar-track {
            background: #0f172a;
        }

        .dark ::-webkit-scrollbar-thumb {
            background: #a78bfa;
        }

        .loading-dots:after {
            content: '.';
            animation: dots 1.5s steps(5, end) infinite;
        }

        @keyframes dots {

            0%,
            20% {
                content: '.';
            }

            40% {
                content: '..';
            }

            60% {
                content: '...';
            }

            80%,
            100% {
                content: '';
            }
        }
    </style>
</head>

<body
    class="overflow-x-hidden selection:bg-brand-purple selection:text-white bg-white dark:bg-brand-dark text-gray-900 dark:text-white transition-colors duration-300">

    {% include antigravity_nav.html %}

    {{ content }}

    {% include antigravity_footer.html %}

    <script src="{{ '/assets/js/antigravity.js' | relative_url }}"></script>
</body>

</html>
